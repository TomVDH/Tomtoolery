<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tsar Bomba — Full Fidelity Nuclear Explosion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; color: #aaa; }
  canvas { border: 1px solid #333; display: block; }
  .controls { margin-top: 12px; display: flex; gap: 16px; align-items: center; }
  button { background: #c33; color: #fff; border: none; padding: 8px 24px; font-size: 14px; cursor: pointer; font-family: inherit; border-radius: 3px; }
  button:hover { background: #e44; }
  #timer { font-size: 14px; color: #888; min-width: 120px; }
  h3 { color: #c44; margin-bottom: 8px; font-size: 13px; letter-spacing: 2px; }
</style>
</head>
<body>
<h3>TSAR BOMBA — FULL FIDELITY PROTOTYPE</h3>
<canvas id="c" width="620" height="640"></canvas>
<div class="controls">
  <button id="btn">Detonate</button>
  <span id="timer">Ready</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 620, H = 640;
const btn = document.getElementById('btn');
const timerEl = document.getElementById('timer');

// --- State ---
let nukeActive = false;
let nukeStart = 0;
const TOTAL_MS = 11000;

// Explosion center
const GX = W / 2;
const GY = H * 0.72; // ground level where stem meets earth

// --- Stars ---
const stars = [];
for (let i = 0; i < 40; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H * 0.45,
    r: 0.5 + Math.random() * 1.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: 0.5 + Math.random() * 2
  });
}

// --- City silhouette ---
const buildings = [];
{
  let bx = 0;
  while (bx < W) {
    const bw = 15 + Math.random() * 35;
    const bh = 20 + Math.random() * 80;
    buildings.push({ x: bx, w: bw, h: bh, windows: [] });
    // windows
    for (let wy = 5; wy < bh - 5; wy += 8) {
      for (let wx = 3; wx < bw - 3; wx += 7) {
        if (Math.random() > 0.4) {
          buildings[buildings.length-1].windows.push({ x: wx, y: wy, lit: Math.random() > 0.5 });
        }
      }
    }
    bx += bw + Math.random() * 4;
  }
}

// --- Wispy clouds ---
const skyClouds = [];
for (let i = 0; i < 5; i++) {
  skyClouds.push({
    x: 40 + Math.random() * (W - 80),
    y: 60 + Math.random() * 120,
    w: 50 + Math.random() * 80,
    h: 12 + Math.random() * 15
  });
}

// --- Particles ---
let embers = [];
let shrapnel = [];
let ash = [];

// --- Screen shake ---
let shakeX = 0, shakeY = 0;

// --- Helpers ---
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }
function easeInOutQuad(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }

function trigger() {
  nukeActive = true;
  nukeStart = performance.now();
  embers = [];
  shrapnel = [];
  ash = [];
  // Spawn shrapnel immediately
  for (let i = 0; i < 40; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 4 + Math.random() * 10;
    shrapnel.push({
      x: GX + (Math.random()-0.5)*20,
      y: GY - 20 + (Math.random()-0.5)*20,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 2,
      life: 30 + Math.random() * 40,
      maxLife: 70,
      r: 0.5 + Math.random() * 1.5,
      hue: 20 + Math.random() * 30
    });
  }
}

btn.onclick = () => { trigger(); };

// --- Main loop ---
function frame(now) {
  requestAnimationFrame(frame);

  const elapsed = nukeActive ? now - nukeStart : -1;
  const t = elapsed / TOTAL_MS; // 0..1 overall progress

  // Update timer display
  if (nukeActive) {
    timerEl.textContent = `${(elapsed/1000).toFixed(2)}s / ${(TOTAL_MS/1000).toFixed(1)}s`;
    if (elapsed > TOTAL_MS) {
      nukeActive = false;
      timerEl.textContent = 'Complete';
    }
  }

  // --- Screen shake ---
  shakeX = 0; shakeY = 0;
  if (nukeActive) {
    let shakeAmp = 0;
    if (elapsed < 3000) {
      shakeAmp = 25 * (1 - elapsed / 3000);
    }
    // Shockwave hit burst at ~1800ms
    if (elapsed > 1500 && elapsed < 2200) {
      const st = (elapsed - 1500) / 700;
      shakeAmp += 15 * (1 - st);
    }
    shakeX = (Math.random() - 0.5) * 2 * shakeAmp;
    shakeY = (Math.random() - 0.5) * 2 * shakeAmp;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // --- Sky background ---
  // Base dark sky, brightens during blast
  let skyBrightness = 0;
  if (nukeActive) {
    if (elapsed < 300) {
      skyBrightness = 1; // white flash
    } else if (elapsed < 1500) {
      skyBrightness = 0.7 * (1 - (elapsed - 300) / 1200);
    } else if (elapsed < 5000) {
      skyBrightness = 0.15 * (1 - (elapsed - 1500) / 3500);
    }
  }
  const baseSkyR = 10, baseSkyG = 10, baseSkyB = 20;
  const skyR = Math.round(lerp(baseSkyR, 255, skyBrightness));
  const skyG = Math.round(lerp(baseSkyG, 240, skyBrightness));
  const skyB = Math.round(lerp(baseSkyB, 200, skyBrightness));
  ctx.fillStyle = `rgb(${skyR},${skyG},${skyB})`;
  ctx.fillRect(-80, -80, W + 160, H + 160);

  // --- Stars (fade during brightness) ---
  const starAlpha = clamp(1 - skyBrightness * 4, 0, 1);
  if (starAlpha > 0.01) {
    stars.forEach(s => {
      const twinkle = 0.5 + 0.5 * Math.sin(now * 0.001 * s.speed + s.twinkle);
      ctx.globalAlpha = starAlpha * twinkle * 0.8;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // --- Wispy clouds (undersides lit during blast) ---
  skyClouds.forEach(c => {
    ctx.save();
    // Normal cloud color
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#556';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w/2, c.h/2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Lit underside during blast
    if (nukeActive && elapsed < 6000) {
      const litT = elapsed < 500 ? elapsed / 500 : (elapsed < 4000 ? 1 : (1 - (elapsed - 4000) / 2000));
      const litAlpha = clamp(litT, 0, 1) * 0.5;
      if (litAlpha > 0.01) {
        const litGrad = ctx.createRadialGradient(c.x, c.y + c.h * 0.3, 0, c.x, c.y + c.h * 0.3, c.w * 0.5);
        litGrad.addColorStop(0, `rgba(255, 180, 60, ${litAlpha})`);
        litGrad.addColorStop(1, `rgba(255, 100, 20, 0)`);
        ctx.globalAlpha = 1;
        ctx.fillStyle = litGrad;
        ctx.beginPath();
        ctx.ellipse(c.x, c.y + c.h * 0.15, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  });

  // ==========================================================
  // === MUSHROOM CLOUD ===
  // ==========================================================
  if (nukeActive && elapsed > 100) {
    const cloudAge = (elapsed - 100) / 1000; // seconds since cloud began
    const cloudT = Math.min(1, cloudAge / 3); // 0..1 over 3s growth
    const capGrow = easeOutCubic(Math.min(1, cloudT * 1.8));

    // --- Darkening timeline ---
    // 2000-4500ms: orange -> crimson -> near-black
    let darkT = 0;
    if (elapsed > 2000 && elapsed < 4500) {
      darkT = (elapsed - 2000) / 2500;
    } else if (elapsed >= 4500) {
      darkT = 1;
    }

    // --- Fade out: 6500-8000ms cloud fades ---
    let fadeAlpha = 1;
    if (elapsed > 6500 && elapsed < 8000) {
      fadeAlpha = 1 - (elapsed - 6500) / 1500;
    } else if (elapsed >= 8000) {
      fadeAlpha = 0;
    }

    if (fadeAlpha > 0.005) {
      ctx.save();
      ctx.globalAlpha = fadeAlpha;

      // Cloud dimensions — MASSIVE, 80% canvas width at peak
      const maxCapRx = W * 0.40; // half-width of cap = 40% of W => 80% total
      const maxCapRy = H * 0.18;
      const capRx = maxCapRx * capGrow;
      const capRy = maxCapRy * capGrow;

      // Rise animation
      const riseEase = easeOutCubic(Math.min(1, cloudT * 1.3));
      const riseHeight = H * 0.42;
      const slowDrift = Math.min(1, elapsed / TOTAL_MS) * H * 0.06;
      const cloudCY = GY - riseEase * riseHeight - slowDrift;
      const stemBaseY = GY;

      // Stem dimensions
      const stemTopW = 30 + capGrow * 30;
      const stemBaseW = 50 + capGrow * 70;

      // Color palette progression
      const hShift = darkT * 20; // hue darkens
      const lDrop = darkT * 40;  // luminance drops
      const sDrop = darkT * 20;  // saturation drops late

      // ---- Ground debris cloud (wide flat ellipse at base) ----
      {
        const debrisGrow = easeOutQuad(Math.min(1, cloudT * 2.5));
        const debrisW = (80 + capGrow * 180) * debrisGrow;
        const debrisH = (8 + capGrow * 25) * debrisGrow;
        const debrisGrad = ctx.createRadialGradient(GX, stemBaseY, 0, GX, stemBaseY, debrisW);
        const dL = Math.max(5, 30 - lDrop);
        const dH = 20 - hShift;
        debrisGrad.addColorStop(0, `hsla(${dH}, 70%, ${dL + 15}%, ${fadeAlpha * 0.8})`);
        debrisGrad.addColorStop(0.4, `hsla(${dH - 3}, 60%, ${dL + 5}%, ${fadeAlpha * 0.5})`);
        debrisGrad.addColorStop(0.8, `hsla(${dH - 5}, 40%, ${dL}%, ${fadeAlpha * 0.2})`);
        debrisGrad.addColorStop(1, `hsla(${dH - 5}, 30%, ${dL}%, 0)`);
        ctx.fillStyle = debrisGrad;
        ctx.beginPath();
        ctx.ellipse(GX, stemBaseY + 5, debrisW, debrisH, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // ---- Intense base glow ----
      {
        const baseGlowR = capRx * 2.2;
        const baseGlowFade = Math.max(0, 1 - darkT * 0.8) * fadeAlpha;
        if (baseGlowFade > 0.01) {
          const bg = ctx.createRadialGradient(GX, stemBaseY - 10, 0, GX, stemBaseY - 10, baseGlowR);
          bg.addColorStop(0, `hsla(40, 100%, 80%, ${baseGlowFade * 0.7})`);
          bg.addColorStop(0.1, `hsla(35, 100%, 65%, ${baseGlowFade * 0.5})`);
          bg.addColorStop(0.3, `hsla(25, 100%, 40%, ${baseGlowFade * 0.2})`);
          bg.addColorStop(0.6, `hsla(15, 80%, 25%, ${baseGlowFade * 0.05})`);
          bg.addColorStop(1, 'hsla(10, 70%, 15%, 0)');
          ctx.fillStyle = bg;
          ctx.beginPath();
          ctx.arc(GX, stemBaseY - 10, baseGlowR, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // ---- Stem with TURBULENT wavy edges ----
      {
        const stemGrad = ctx.createLinearGradient(GX, cloudCY + capRy * 0.3, GX, stemBaseY);
        const sL = (v) => Math.max(5, v - lDrop);
        stemGrad.addColorStop(0, `hsla(${28 - hShift}, ${90 - sDrop}%, ${sL(50)}%, ${fadeAlpha})`);
        stemGrad.addColorStop(0.3, `hsla(${22 - hShift}, ${85 - sDrop}%, ${sL(40)}%, ${fadeAlpha})`);
        stemGrad.addColorStop(0.7, `hsla(${18 - hShift}, ${75 - sDrop}%, ${sL(30)}%, ${fadeAlpha})`);
        stemGrad.addColorStop(1, `hsla(${12 - hShift}, ${60 - sDrop}%, ${sL(22)}%, ${fadeAlpha})`);
        ctx.fillStyle = stemGrad;

        // Draw stem with sin-wave turbulence
        const steps = 30;
        const stemTop = cloudCY + capRy * 0.25;
        ctx.beginPath();
        // Left edge (top to bottom)
        for (let i = 0; i <= steps; i++) {
          const frac = i / steps;
          const y = stemTop + (stemBaseY - stemTop) * frac;
          const baseW = lerp(stemTopW / 2, stemBaseW / 2, frac);
          const turb = Math.sin(frac * 12 + now * 0.002) * 4
                     + Math.sin(frac * 7 + now * 0.003 + 1.3) * 3
                     + Math.sin(frac * 20 + now * 0.005 + 2.7) * 1.5;
          const x = GX - baseW - turb;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        // Right edge (bottom to top)
        for (let i = steps; i >= 0; i--) {
          const frac = i / steps;
          const y = stemTop + (stemBaseY - stemTop) * frac;
          const baseW = lerp(stemTopW / 2, stemBaseW / 2, frac);
          const turb = Math.sin(frac * 12 + now * 0.002 + 3.14) * 4
                     + Math.sin(frac * 7 + now * 0.003 + 4.5) * 3
                     + Math.sin(frac * 20 + now * 0.005 + 5.9) * 1.5;
          const x = GX + baseW + turb;
          ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();

        // Stem internal glow (hot center line)
        const stemCenterGlow = Math.max(0, 1 - darkT * 1.2) * fadeAlpha;
        if (stemCenterGlow > 0.02) {
          const sg = ctx.createLinearGradient(GX - stemTopW * 0.15, 0, GX + stemTopW * 0.15, 0);
          sg.addColorStop(0, `hsla(30, 100%, 60%, 0)`);
          sg.addColorStop(0.3, `hsla(35, 100%, 70%, ${stemCenterGlow * 0.3})`);
          sg.addColorStop(0.5, `hsla(40, 100%, 80%, ${stemCenterGlow * 0.5})`);
          sg.addColorStop(0.7, `hsla(35, 100%, 70%, ${stemCenterGlow * 0.3})`);
          sg.addColorStop(1, `hsla(30, 100%, 60%, 0)`);
          ctx.fillStyle = sg;
          ctx.fillRect(GX - stemTopW * 0.5, stemTop, stemTopW, stemBaseY - stemTop);
        }
      }

      // ---- Cap: enormous elliptical dome ----
      // Radiant glow behind cap
      {
        const glowRadius = Math.max(capRx, capRy) * 2.8;
        const glowFade = Math.max(0, 1 - darkT * 0.6) * fadeAlpha;
        if (glowFade > 0.01) {
          const cg = ctx.createRadialGradient(GX, cloudCY, capRy * 0.2, GX, cloudCY, glowRadius);
          cg.addColorStop(0, `hsla(35, 100%, ${Math.max(15, 65 - lDrop)}%, ${glowFade * 0.45})`);
          cg.addColorStop(0.25, `hsla(28, 100%, ${Math.max(10, 50 - lDrop)}%, ${glowFade * 0.25})`);
          cg.addColorStop(0.5, `hsla(20, 90%, ${Math.max(8, 35 - lDrop)}%, ${glowFade * 0.1})`);
          cg.addColorStop(1, 'hsla(15, 80%, 15%, 0)');
          ctx.fillStyle = cg;
          ctx.beginPath();
          ctx.arc(GX, cloudCY, glowRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Outer cap (largest, darkest orange)
      {
        const outerH = 10 - hShift;
        const outerL = Math.max(4, 20 - lDrop);
        ctx.fillStyle = `hsla(${outerH}, ${60 - sDrop}%, ${outerL}%, ${fadeAlpha})`;
        ctx.beginPath();
        ctx.ellipse(GX, cloudCY, capRx * 1.1, capRy * 1.0, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Mid-outer cap
      {
        const h = 16 - hShift;
        const l = Math.max(6, 28 - lDrop);
        ctx.fillStyle = `hsla(${h}, ${75 - sDrop}%, ${l}%, ${fadeAlpha})`;
        ctx.beginPath();
        ctx.ellipse(GX, cloudCY - capRy * 0.04, capRx * 0.93, capRy * 0.88, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Mid cap (bright orange)
      {
        const h = 22 - hShift;
        const l = Math.max(8, 38 - lDrop);
        ctx.fillStyle = `hsla(${h}, ${85 - sDrop}%, ${l}%, ${fadeAlpha})`;
        ctx.beginPath();
        ctx.ellipse(GX, cloudCY - capRy * 0.07, capRx * 0.78, capRy * 0.76, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Inner bright layer
      {
        const h = 28 - hShift;
        const l = Math.max(10, 48 - lDrop);
        ctx.fillStyle = `hsla(${h}, ${90 - sDrop}%, ${l}%, ${fadeAlpha})`;
        ctx.beginPath();
        ctx.ellipse(GX, cloudCY - capRy * 0.1, capRx * 0.58, capRy * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Hot core (yellow-orange, stays bright longer)
      {
        const coreDarkDelay = elapsed > 4000 ? Math.min(1, (elapsed - 4000) / 2500) : 0;
        const coreL = Math.max(15, 68 - coreDarkDelay * 55);
        const coreH = 38 - coreDarkDelay * 25;
        const coreA = fadeAlpha * Math.max(0.1, 1 - coreDarkDelay * 0.8);
        ctx.fillStyle = `hsla(${coreH}, 100%, ${coreL}%, ${coreA})`;
        ctx.beginPath();
        ctx.ellipse(GX, cloudCY - capRy * 0.12, capRx * 0.38, capRy * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Double fireball: white-hot inner core
      {
        const whiteT = elapsed < 1500 ? 1 : (elapsed < 3500 ? 1 - (elapsed - 1500) / 2000 : 0);
        if (whiteT > 0.01) {
          const wa = whiteT * fadeAlpha * 0.9;
          // White-hot glow
          const whiteGrad = ctx.createRadialGradient(GX, cloudCY - capRy * 0.1, 0, GX, cloudCY - capRy * 0.1, capRx * 0.3);
          whiteGrad.addColorStop(0, `rgba(255, 255, 240, ${wa})`);
          whiteGrad.addColorStop(0.4, `rgba(255, 240, 200, ${wa * 0.7})`);
          whiteGrad.addColorStop(0.7, `rgba(255, 200, 120, ${wa * 0.3})`);
          whiteGrad.addColorStop(1, `rgba(255, 160, 60, 0)`);
          ctx.fillStyle = whiteGrad;
          ctx.beginPath();
          ctx.ellipse(GX, cloudCY - capRy * 0.1, capRx * 0.3, capRy * 0.32, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // ---- Base ring (skirt at bottom of cap) ----
      {
        const bH = 14 - hShift;
        const bL = Math.max(5, 26 - lDrop);
        ctx.fillStyle = `hsla(${bH}, ${65 - sDrop}%, ${bL}%, ${fadeAlpha * 0.75})`;
        ctx.beginPath();
        ctx.ellipse(GX, cloudCY + capRy * 0.55, capRx * 1.15, capRy * 0.22, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // ---- 5-6 concentric cloud bands across cap face ----
      {
        const bandCount = 6;
        const nowSec = elapsed / 1000;
        for (let i = 0; i < bandCount; i++) {
          const entryDelay = 0.2 + i * 0.18; // staggered appearance, bottom-up
          if (cloudT < entryDelay) continue;
          const bandAge = Math.min(1, (cloudT - entryDelay) / 0.5);
          const t01 = i / (bandCount - 1); // 0=bottom, 1=top
          // Position: widest at bottom, narrowest at top
          const startY = cloudCY + capRy * 0.45;
          const endY = cloudCY - capRy * 0.7;
          const bandY = lerp(startY, endY, t01) * bandAge + startY * (1 - bandAge);
          // Add wave motion
          const wave = Math.sin(nowSec * (0.5 + i * 0.2) + i * 2.1) * capRy * 0.03
                     + Math.sin(nowSec * (0.3 + i * 0.15) + i * 4.5) * capRy * 0.02;
          const finalY = bandY + wave;
          // Width narrows toward top
          const widthFrac = lerp(1.0, 0.3, t01);
          const bandW = capRx * widthFrac * bandAge;
          // Appearance
          const bandAlpha = fadeAlpha * bandAge * (0.3 + 0.15 * Math.sin(nowSec * (1.0 + i * 0.3) + i));
          const bandL = Math.max(8, (42 - i * 3) - lDrop);
          const bandH = 24 - hShift + i * 2;
          const sag1 = capRy * 0.06 * Math.sin(nowSec * (0.7 + i * 0.25) + i);
          const sag2 = capRy * 0.04 * Math.sin(nowSec * (0.55 + i * 0.18) + i + 1.2);

          ctx.strokeStyle = `hsla(${bandH}, ${75 - sDrop}%, ${bandL}%, ${bandAlpha})`;
          ctx.lineWidth = (5 + (1 - t01) * 3) * bandAge;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(GX - bandW, finalY);
          ctx.bezierCurveTo(
            GX - bandW * 0.5, finalY + sag1,
            GX + bandW * 0.5, finalY + sag2,
            GX + bandW, finalY
          );
          ctx.stroke();
        }
      }

      // ---- Heat distortion shimmer (subtle position jitter on cap) ----
      if (elapsed < 5000 && capGrow > 0.3) {
        const shimmerAlpha = fadeAlpha * 0.08 * Math.max(0, 1 - elapsed / 5000);
        const shimOffX = Math.sin(now * 0.013) * 3;
        const shimOffY = Math.cos(now * 0.017) * 2;
        ctx.globalAlpha = shimmerAlpha;
        ctx.fillStyle = `hsla(35, 100%, 70%, 0.5)`;
        ctx.beginPath();
        ctx.ellipse(GX + shimOffX, cloudCY + shimOffY, capRx * 0.5, capRy * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = fadeAlpha;
      }

      ctx.restore();
    }
  }

  // ==========================================================
  // === SHOCKWAVE RING ===
  // ==========================================================
  if (nukeActive && elapsed > 200 && elapsed < 2000) {
    const st = (elapsed - 200) / 1800;
    const radius = st * Math.max(W, H) * 0.9;
    const ringAlpha = (1 - st) * 0.45;

    ctx.save();
    ctx.globalAlpha = ringAlpha;
    // Double ring for depth
    ctx.strokeStyle = `rgba(255, 230, 180, 0.7)`;
    ctx.lineWidth = 4 + (1 - st) * 12;
    ctx.beginPath();
    ctx.arc(GX, GY - 30, radius, 0, Math.PI * 2);
    ctx.stroke();
    // Inner brighter ring
    ctx.strokeStyle = `rgba(255, 255, 220, 0.5)`;
    ctx.lineWidth = 2 + (1 - st) * 5;
    ctx.beginPath();
    ctx.arc(GX, GY - 30, radius * 0.92, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // --- Shockwave "hits viewer" brightness pulse at 1500-2200ms ---
  if (nukeActive && elapsed > 1500 && elapsed < 2200) {
    const hitT = (elapsed - 1500) / 700;
    const hitPulse = Math.sin(hitT * Math.PI) * 0.25;
    if (hitPulse > 0.01) {
      ctx.globalAlpha = hitPulse;
      ctx.fillStyle = '#fff';
      ctx.fillRect(-80, -80, W + 160, H + 160);
      ctx.globalAlpha = 1;
    }
  }

  // ==========================================================
  // === CITY SILHOUETTE ===
  // ==========================================================
  const groundY = GY + 15;
  // Ground
  ctx.fillStyle = '#080810';
  ctx.fillRect(-80, groundY, W + 160, H - groundY + 80);

  buildings.forEach(b => {
    const bTop = groundY - b.h;
    // Building body
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(b.x, bTop, b.w, b.h + 80);

    // Windows (dim during blast, normal otherwise)
    b.windows.forEach(win => {
      if (win.lit) {
        const winAlpha = nukeActive && elapsed < 5000 ? 0.1 : 0.35;
        ctx.fillStyle = `rgba(255, 220, 120, ${winAlpha})`;
        ctx.fillRect(b.x + win.x, bTop + win.y, 3, 3);
      }
    });

    // ---- Building rim lighting (top edge orange during blast) ----
    if (nukeActive && elapsed > 100 && elapsed < 7000) {
      let rimIntensity = 0;
      if (elapsed < 500) rimIntensity = elapsed / 500;
      else if (elapsed < 3000) rimIntensity = 1;
      else rimIntensity = Math.max(0, 1 - (elapsed - 3000) / 4000);

      if (rimIntensity > 0.01) {
        // Top edge glow
        const rimGrad = ctx.createLinearGradient(b.x, bTop, b.x, bTop + 8);
        rimGrad.addColorStop(0, `rgba(255, 160, 40, ${rimIntensity * 0.7})`);
        rimGrad.addColorStop(0.3, `rgba(255, 120, 20, ${rimIntensity * 0.3})`);
        rimGrad.addColorStop(1, `rgba(200, 80, 10, 0)`);
        ctx.fillStyle = rimGrad;
        ctx.fillRect(b.x, bTop, b.w, 8);

        // Side glow facing explosion
        const dx = b.x + b.w / 2 - GX;
        const side = dx < 0 ? b.x + b.w : b.x; // edge facing GX
        const sideGrad = ctx.createLinearGradient(side, bTop, side + (dx < 0 ? -4 : 4), bTop);
        sideGrad.addColorStop(0, `rgba(255, 140, 30, ${rimIntensity * 0.4})`);
        sideGrad.addColorStop(1, `rgba(200, 80, 10, 0)`);
        ctx.fillStyle = sideGrad;
        ctx.fillRect(dx < 0 ? side : side - 4, bTop, 4, b.h);
      }
    }
  });

  // ==========================================================
  // === PARTICLES ===
  // ==========================================================

  // --- Spawn embers at 600ms ---
  if (nukeActive && elapsed > 600 && elapsed < 4000) {
    const spawnRate = elapsed < 1500 ? 3 : 1;
    for (let i = 0; i < spawnRate; i++) {
      if (embers.length < 60) {
        embers.push({
          x: GX + (Math.random() - 0.5) * 80,
          y: GY - 30 - Math.random() * 60,
          vx: (Math.random() - 0.5) * 4,
          vy: -3 - Math.random() * 6,
          life: 60 + Math.random() * 80,
          maxLife: 140,
          r: 1 + Math.random() * 2.5,
          hue: 20 + Math.random() * 30
        });
      }
    }
  }

  // --- Spawn ash after 3s ---
  if (nukeActive && elapsed > 3000 && elapsed < 9000) {
    if (ash.length < 50 && Math.random() < 0.15) {
      ash.push({
        x: Math.random() * W,
        y: -5,
        vx: (Math.random() - 0.5) * 0.8,
        vy: 0.3 + Math.random() * 0.6,
        life: 200 + Math.random() * 150,
        maxLife: 350,
        r: 0.8 + Math.random() * 1.2
      });
    }
  }

  // --- Update & draw shrapnel ---
  shrapnel.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.vy += 0.04;
    p.life--;
    const t = p.life / p.maxLife;
    ctx.globalAlpha = t * 0.8;
    // Streak
    ctx.strokeStyle = `hsl(${p.hue}, 100%, ${55 + (1-t)*25}%)`;
    ctx.lineWidth = p.r * t;
    ctx.beginPath();
    ctx.moveTo(p.x - p.vx * 3, p.y - p.vy * 3);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    // Head
    ctx.fillStyle = `hsl(${p.hue}, 100%, ${65 + (1-t)*25}%)`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * t * 0.5, 0, Math.PI * 2); ctx.fill();
  });
  shrapnel = shrapnel.filter(p => p.life > 0);
  ctx.globalAlpha = 1;

  // --- Update & draw embers ---
  embers.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.99; p.vy *= 0.99;
    p.vy += 0.05; // gravity
    p.life--;
    const t = clamp(p.life / p.maxLife, 0, 1);
    ctx.globalAlpha = t * 0.85;
    // Glow
    ctx.shadowColor = `hsl(${p.hue}, 100%, 60%)`;
    ctx.shadowBlur = 6;
    ctx.fillStyle = `hsl(${p.hue}, 100%, ${55 + (1-t)*30}%)`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.3 + t * 0.7), 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  });
  embers = embers.filter(p => p.life > 0);
  ctx.globalAlpha = 1;

  // --- Update & draw ash ---
  ash.forEach(p => {
    p.x += p.vx + Math.sin(now * 0.001 + p.x * 0.01) * 0.3;
    p.y += p.vy;
    p.life--;
    const t = clamp(p.life / p.maxLife, 0, 1);
    ctx.globalAlpha = t * 0.4;
    ctx.fillStyle = '#888';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  });
  ash = ash.filter(p => p.life > 0);
  ctx.globalAlpha = 1;

  // ==========================================================
  // === OVERLAY EFFECTS (drawn on top of everything) ===
  // ==========================================================

  // --- Blinding white flash (0-300ms) ---
  if (nukeActive && elapsed < 300) {
    const ft = elapsed / 300;
    ctx.globalAlpha = (1 - ft * ft) * 0.97;
    ctx.fillStyle = '#fff';
    ctx.fillRect(-80, -80, W + 160, H + 160);
    ctx.globalAlpha = 1;
  }

  // --- Warm radial glow overlay (0-5000ms) ---
  if (nukeActive && elapsed < 5000) {
    const lt = elapsed / 5000;
    const intensity = (1 - lt * lt) * 0.5;
    if (intensity > 0.01) {
      const rad = Math.max(W, H) * 1.3;
      const cloudT2 = Math.min(1, Math.max(0, elapsed - 100) / 3000);
      const riseEase2 = easeOutCubic(Math.min(1, cloudT2 * 1.3));
      const slowDrift2 = Math.min(1, elapsed / TOTAL_MS) * H * 0.06;
      const glowCY = GY - riseEase2 * (H * 0.42) - slowDrift2;

      const rg = ctx.createRadialGradient(GX, glowCY, 0, GX, glowCY, rad);
      rg.addColorStop(0, `hsla(38, 100%, 70%, ${intensity})`);
      rg.addColorStop(0.15, `hsla(30, 100%, 55%, ${intensity * 0.65})`);
      rg.addColorStop(0.35, `hsla(22, 100%, 40%, ${intensity * 0.3})`);
      rg.addColorStop(0.6, `hsla(15, 90%, 25%, ${intensity * 0.1})`);
      rg.addColorStop(1, 'hsla(10, 80%, 15%, 0)');
      ctx.fillStyle = rg;
      ctx.fillRect(-80, -80, W + 160, H + 160);
    }
  }

  // --- Secondary base glow at ground (intense, quick vertical taper) ---
  if (nukeActive && elapsed < 6000) {
    const bgT = elapsed / 6000;
    const bgInt = (1 - bgT) * 0.55;
    if (bgInt > 0.01) {
      const bgGrad = ctx.createRadialGradient(GX, GY + 15, 0, GX, GY + 15, 200);
      bgGrad.addColorStop(0, `hsla(35, 100%, 75%, ${bgInt})`);
      bgGrad.addColorStop(0.2, `hsla(28, 100%, 55%, ${bgInt * 0.5})`);
      bgGrad.addColorStop(0.5, `hsla(20, 90%, 35%, ${bgInt * 0.15})`);
      bgGrad.addColorStop(1, 'hsla(15, 80%, 20%, 0)');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(-80, GY - 120, W + 160, 300);
    }
  }

  // --- Sky returns to normal (8000-11000ms): subtle vignette restoration ---
  if (!nukeActive || elapsed > 8000) {
    // Normal vignette
    const vg = ctx.createRadialGradient(W/2, H/2, H * 0.3, W/2, H/2, H * 0.8);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = vg;
    ctx.fillRect(-80, -80, W + 160, H + 160);
  }

  ctx.restore(); // undo shake translate

  // ==========================================================
  // === IDLE STATE (no active explosion) ===
  // ==========================================================
  if (!nukeActive && elapsed < 0) {
    // Just draw the normal scene (already drawn above)
  }
}

requestAnimationFrame(frame);
</script>
</body>
</html>
